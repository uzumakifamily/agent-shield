<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in — AgentShield</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,600,700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0a0b0d;
      --card:    #111318;
      --teal:    #01696f;
      --teal-b:  #00909a;
      --border:  rgba(255,255,255,0.09);
      --border2: rgba(255,255,255,0.14);
      --text:    #f1f5f9;
      --muted:   #64748b;
      --muted2:  #94a3b8;
      --red:     #ef4444;
      --green:   #10b981;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    /* subtle grid background */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(1,105,111,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(1,105,111,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .auth-wrap {
      position: relative; z-index: 1;
      display: flex; flex-direction: column; align-items: center;
      width: 100%; max-width: 420px;
    }

    .auth-logo {
      font-family: 'Satoshi', 'Inter', sans-serif;
      font-weight: 800; font-size: 1.3rem; letter-spacing: -.02em;
      margin-bottom: 36px;
      cursor: pointer;
    }
    .auth-logo span { color: var(--teal-b); }

    .auth-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 36px;
      width: 100%;
      box-shadow: 0 24px 64px rgba(0,0,0,0.5);
    }

    .auth-card h1 {
      font-family: 'Satoshi', 'Inter', sans-serif;
      font-weight: 800; font-size: 1.6rem;
      letter-spacing: -.02em; margin-bottom: 6px;
    }
    .auth-sub { font-size: .875rem; color: var(--muted2); margin-bottom: 28px; }

    .form-group { margin-bottom: 16px; }
    .form-group label {
      display: block; font-size: .78rem; font-weight: 600;
      letter-spacing: .04em; text-transform: uppercase;
      color: var(--muted2); margin-bottom: 7px;
    }
    .form-group input {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border2);
      border-radius: 10px;
      padding: 12px 14px;
      color: var(--text);
      font-size: .9rem;
      font-family: inherit;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .form-group input:focus {
      border-color: rgba(1,105,111,0.6);
      box-shadow: 0 0 0 3px rgba(1,105,111,0.12);
    }
    .form-group input::placeholder { color: var(--muted); }

    .form-error {
      font-size: .82rem; color: var(--red);
      min-height: 20px; margin-top: 10px;
      display: flex; align-items: center; gap: 6px;
    }

    .btn-submit {
      width: 100%;
      background: var(--teal);
      color: #fff;
      border: none;
      padding: 13px;
      border-radius: 10px;
      font-size: .95rem; font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      margin-top: 8px;
      transition: background .2s, transform .15s, box-shadow .2s;
    }
    .btn-submit:hover {
      background: var(--teal-b);
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(1,144,154,0.3);
    }
    .btn-submit:disabled { opacity: .6; cursor: not-allowed; transform: none; box-shadow: none; }

    .btn-google {
      width: 100%; background: #fff; color: #333; border: none;
      padding: 12px; border-radius: 10px; font-size: .9rem; font-weight: 600;
      cursor: pointer; font-family: inherit; margin-top: 12px;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      transition: background .2s, transform .15s;
    }
    .btn-google:hover { background: #f1f5f9; transform: translateY(-1px); }
    .btn-google svg { width: 18px; height: 18px; }

    .auth-footer {
      text-align: center; margin-top: 22px;
      font-size: .85rem; color: var(--muted);
    }
    .auth-footer a {
      color: var(--teal-b); cursor: pointer; text-decoration: none;
      font-weight: 500;
    }
    .auth-footer a:hover { text-decoration: underline; }

    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 20px 0; color: var(--muted); font-size: .78rem;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }

    /* OTP Panel */
    .otp-panel { display: none; }
    .otp-panel.active { display: block; }
    .otp-email { font-weight: 600; color: var(--teal-b); }
    .otp-inputs { display: flex; gap: 8px; justify-content: center; margin: 20px 0; }
    .otp-inputs input {
      width: 44px; height: 52px; text-align: center; font-size: 1.4rem; font-weight: 700;
      background: rgba(255,255,255,0.04); border: 1px solid var(--border2); border-radius: 10px;
      color: var(--text); font-family: inherit; outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .otp-inputs input:focus {
      border-color: rgba(1,105,111,0.6);
      box-shadow: 0 0 0 3px rgba(1,105,111,0.12);
    }
    .otp-resend { text-align: center; font-size: .85rem; color: var(--muted); margin-top: 12px; }
    .otp-resend a { color: var(--teal-b); cursor: pointer; font-weight: 500; }
    .otp-resend a:hover { text-decoration: underline; }
    .otp-timer { color: var(--muted); font-size: .8rem; text-align: center; margin-top: 8px; }

    .success-state {
      text-align: center; display: none;
      padding: 12px 0;
    }
    .success-icon {
      width: 56px; height: 56px; border-radius: 50%;
      background: rgba(16,185,129,0.12); border: 2px solid rgba(16,185,129,0.3);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 16px; font-size: 1.5rem;
    }
    .success-state h3 { font-weight: 700; margin-bottom: 6px; }
    .success-state p { font-size: .875rem; color: var(--muted2); }

    @media (max-width: 480px) {
      .auth-card { padding: 28px 24px; }
    }
  </style>
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-logo" onclick="location.href='/'">AgentShield<span>.</span></div>

    <div class="auth-card">
      <!-- Login Form -->
      <div id="login-form-panel">
        <h1>Welcome back</h1>
        <p class="auth-sub">Sign in to your AgentShield workspace.</p>

        <!-- Google Sign In — fastest path, no OTP needed -->
        <button class="btn-google" onclick="startGoogleAuth()" style="margin-bottom:6px">
          <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Continue with Google
        </button>
        <p style="text-align:center;font-size:.75rem;color:var(--muted);margin-bottom:4px">Personal account? Google is the easiest way in — no OTP needed.</p>

        <div class="divider">or sign in with email</div>

        <form id="login-form" onsubmit="handleLogin(event)">
          <div class="form-group">
            <label>Email address</label>
            <input type="email" id="l-email" placeholder="you@example.com" autocomplete="email" required>
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="l-password" placeholder="Your password" autocomplete="current-password" required>
          </div>
          <div class="form-error" id="login-error"></div>
          <button class="btn-submit" type="submit" id="login-btn">Sign in →</button>
        </form>

        <div class="auth-footer">
          No account yet?
          <a href="/">Start free →</a>
        </div>
      </div>

      <!-- OTP Verification Panel -->
      <div class="otp-panel" id="otp-panel">
        <h1>Verify your email</h1>
        <p class="auth-sub">
          We've sent a 6-digit code to <span class="otp-email" id="otp-email-display"></span>
        </p>
        <div class="otp-inputs" id="otp-inputs">
          <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" data-index="0">
          <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" data-index="1">
          <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" data-index="2">
          <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" data-index="3">
          <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" data-index="4">
          <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" data-index="5">
        </div>
        <div class="form-error" id="otp-error"></div>
        <button class="btn-submit" id="otp-verify-btn" onclick="submitOtp()">Verify →</button>
        <div class="otp-resend">
          Didn't receive it? <a onclick="resendOtp()">Resend code</a>
        </div>
        <div class="otp-timer" id="otp-timer"></div>
        <div class="auth-footer" style="margin-top:20px">
          <a onclick="backToLogin()">← Back to sign in</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    window.APP = {};
    const SHIELD_API = window.SHIELD_API_BASE || '';
    let pendingEmail = '';
    let otpTimerInterval = null;

    // If already logged in, redirect
    const existing = sessionStorage.getItem('shield_token');
    if (existing) {
      location.href = '/dashboard.html';
    }

    // Check for OAuth error in URL
    const urlParams = new URLSearchParams(window.location.search);
    const oauthError = urlParams.get('error');
    if (oauthError) {
      document.getElementById('login-error').textContent = decodeURIComponent(oauthError);
    }

    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      const err = document.getElementById('login-error');
      err.textContent = '';
      btn.disabled = true;
      btn.textContent = 'Signing in…';

      const email    = document.getElementById('l-email').value.trim();
      const password = document.getElementById('l-password').value;

      try {
        const res = await fetch(SHIELD_API + '/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json().catch(() => ({}));

        if (!res.ok) {
          if (res.status === 403 && data.status === 'pending_verification') {
            // Show OTP panel
            pendingEmail = data.email;
            document.getElementById('login-form-panel').style.display = 'none';
            document.getElementById('otp-panel').classList.add('active');
            document.getElementById('otp-email-display').textContent = pendingEmail;
            setupOtpInputs();
            startOtpTimer(600);
            return;
          }
          err.textContent = data.error || 'Sign in failed. Please check your credentials.';
          btn.disabled = false;
          btn.textContent = 'Sign in →';
          return;
        }

        sessionStorage.setItem('shield_token', data.token);
        sessionStorage.setItem('shield_user', JSON.stringify(data.user || {}));
        location.href = '/dashboard.html';

      } catch (ex) {
        err.textContent = 'Network error — is the server running?';
        btn.disabled = false;
        btn.textContent = 'Sign in →';
      }
    }

    // ── OTP Input Handling ───────────────────────────────────
    function setupOtpInputs() {
      const inputs = document.querySelectorAll('#otp-inputs input');
      inputs.forEach((input, idx) => {
        input.value = '';
        input.addEventListener('keydown', (e) => {
          if (e.key === 'Backspace' && !input.value && idx > 0) {
            inputs[idx - 1].focus();
          }
        });
        input.addEventListener('input', (e) => {
          const val = e.target.value.replace(/\D/g, '');
          e.target.value = val;
          if (val && idx < inputs.length - 1) {
            inputs[idx + 1].focus();
          }
          if (idx === inputs.length - 1 && val) {
            submitOtp();
          }
        });
        input.addEventListener('paste', (e) => {
          e.preventDefault();
          const paste = (e.clipboardData.getData('text') || '').replace(/\D/g, '').slice(0, 6);
          paste.split('').forEach((char, i) => {
            if (inputs[i]) inputs[i].value = char;
          });
          if (paste.length === 6) submitOtp();
          else if (inputs[paste.length]) inputs[paste.length].focus();
        });
      });
      inputs[0].focus();
    }

    function getOtpValue() {
      return Array.from(document.querySelectorAll('#otp-inputs input'))
        .map(i => i.value).join('');
    }

    async function submitOtp() {
      const otp = getOtpValue();
      if (otp.length !== 6) return;

      const btn = document.getElementById('otp-verify-btn');
      const err = document.getElementById('otp-error');
      btn.disabled = true;
      btn.textContent = 'Verifying…';
      err.textContent = '';

      try {
        const res = await fetch(SHIELD_API + '/api/auth/verify-otp', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: pendingEmail, otp })
        });
        const data = await res.json().catch(() => ({}));

        if (!res.ok) {
          err.textContent = data.error || 'Invalid code. Please try again.';
          btn.disabled = false;
          btn.textContent = 'Verify →';
          document.querySelectorAll('#otp-inputs input').forEach(i => i.value = '');
          document.querySelector('#otp-inputs input').focus();
          return;
        }

        sessionStorage.setItem('shield_token', data.token);
        sessionStorage.setItem('shield_user', JSON.stringify(data.user || {}));
        location.href = '/dashboard.html';
      } catch (ex) {
        err.textContent = 'Network error. Please try again.';
        btn.disabled = false;
        btn.textContent = 'Verify →';
      }
    }

    async function resendOtp() {
      const err = document.getElementById('otp-error');
      err.textContent = '';

      try {
        const res = await fetch(SHIELD_API + '/api/auth/request-otp', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: pendingEmail })
        });
        const data = await res.json().catch(() => ({}));

        if (res.status === 429) {
          err.textContent = data.error || 'Too many attempts. Please wait.';
          return;
        }

        err.style.color = 'var(--green)';
        err.textContent = 'New code sent!';
        setTimeout(() => { err.style.color = ''; err.textContent = ''; }, 3000);
        startOtpTimer(600);
      } catch (ex) {
        err.textContent = 'Failed to resend. Please try again.';
      }
    }

    function startOtpTimer(seconds) {
      if (otpTimerInterval) clearInterval(otpTimerInterval);
      const el = document.getElementById('otp-timer');
      let remaining = seconds;

      function tick() {
        const m = Math.floor(remaining / 60);
        const s = remaining % 60;
        el.textContent = `Code expires in ${m}:${s.toString().padStart(2, '0')}`;
        if (remaining <= 0) {
          clearInterval(otpTimerInterval);
          el.textContent = 'Code expired. Click Resend to get a new one.';
        }
        remaining--;
      }
      tick();
      otpTimerInterval = setInterval(tick, 1000);
    }

    function backToLogin() {
      document.getElementById('otp-panel').classList.remove('active');
      document.getElementById('login-form-panel').style.display = 'block';
      document.getElementById('login-error').textContent = '';
      pendingEmail = '';
      if (otpTimerInterval) clearInterval(otpTimerInterval);
    }

    // ── Google Auth ───────────────────────────────────────────
    function startGoogleAuth() {
      window.location.href = SHIELD_API + '/api/auth/google/start';
    }

    // Focus email on load
    window.addEventListener('DOMContentLoaded', () => {
      document.getElementById('l-email').focus();
    });
  </script>
</body>
</html>
